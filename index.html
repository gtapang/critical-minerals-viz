<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Pax-Silica — Critical Minerals Network</title>
<style>
/* ============================================================
   Pax-Silica v4 — Critical Minerals Geopolitical Network
   Dark theme, embedded (no external CSS files)
   ============================================================ */

:root {
  --bg: #0d1117;
  --text: #c9d1d9;
  --panel-bg: rgba(22,27,34,0.97);
  --overlay-bg: rgba(13,17,23,0.85);
  --border: rgba(201,209,217,0.15);
  --radius: 8px;

  /* Node types */
  --c-company:    #58a6ff;
  --c-country:    #f85149;
  --c-mineral:    #3fb950;
  --c-deposit:    #d29922;
  --c-person:     #db61a8;
  --c-regulatory: #ff8c00;

  /* Link types */
  --l-member_of:      #58a6ff;
  --l-controls:       #ff8c00;
  --l-partner:        #39c5cf;
  --l-competes:       #d2a8ff;
  --l-produces:       #3fb950;
  --l-secures:        #bc8cff;
  --l-founded:        #e3b341;
  --l-chairs:         #ffa657;
  --l-located_in:     #8b949e;
  --l-operates:       #f0883e;
  --l-processes:      #56d4dd;
  --l-supply:         #79c0ff;
  --l-processed_into: #a371f7;
  --l-offtake:        #bc8cff;
  --l-equity:         #e3b341;
  --l-sanctions:      #ff7b72;
  --l-recycles:       #3fb950;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

/* ---- Graph view ---- */
#graph, #sankey {
  width: 100vw; height: 100vh;
  position: absolute; top: 0; left: 0;
  z-index: 1;
}
#graph svg, #sankey svg { width: 100%; height: 100%; display: block; }
.hidden { display: none !important; }

/* SVG elements */
.node { stroke: var(--bg); stroke-width: 1.5; cursor: pointer; transition: opacity 0.2s; }
.node-company    { fill: var(--c-company); }
.node-country    { fill: var(--c-country); }
.node-mineral    { fill: var(--c-mineral); }
.node-deposit    { fill: var(--c-deposit); }
.node-person     { fill: var(--c-person); }
.node-regulatory { fill: var(--c-regulatory); }

.link { stroke-opacity: 0.6; transition: stroke-opacity 0.2s; fill: none; }
.link-member_of      { stroke: var(--l-member_of); }
.link-controls       { stroke: var(--l-controls); }
.link-partner        { stroke: var(--l-partner); stroke-dasharray: 6 3; }
.link-competes       { stroke: var(--l-competes); stroke-dasharray: 4 2; }
.link-produces       { stroke: var(--l-produces); }
.link-secures        { stroke: var(--l-secures); }
.link-founded        { stroke: var(--l-founded); }
.link-chairs         { stroke: var(--l-chairs); }
.link-located_in     { stroke: var(--l-located_in); }
.link-operates       { stroke: var(--l-operates); }
.link-processes      { stroke: var(--l-processes); }
.link-supply         { stroke: var(--l-supply); }
.link-processed_into { stroke: var(--l-processed_into); stroke-dasharray: 2 3; }
.link-offtake        { stroke: var(--l-offtake); stroke-dasharray: 2 3; }
.link-equity         { stroke: var(--l-equity); }
.link-sanctions      { stroke: var(--l-sanctions); }
.link-recycles       { stroke: var(--l-recycles); }

text { font: 11px sans-serif; fill: var(--text); pointer-events: none; user-select: none; }
.dimmed { opacity: 0.1 !important; }

/* ---- Title ---- */
#title-overlay {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 20; text-align: center;
}
#title-overlay h1 {
  background: var(--overlay-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 5px 18px; margin: 0;
  font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap;
}

/* ---- View toggle ---- */
#view-toggle {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 20; margin-top: 36px;
  background: rgba(88,166,255,0.2); border: 1px solid var(--c-company);
  border-radius: var(--radius); color: #fff; padding: 5px 18px;
  font-size: 13px; cursor: pointer; transition: background 0.2s;
}
#view-toggle:hover { background: rgba(88,166,255,0.35); }

/* ---- Legend ---- */
#legend {
  position: fixed; top: 12px; left: 12px; z-index: 20;
  background: var(--overlay-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; font-size: 11px;
  display: grid; gap: 2px 14px; grid-template-columns: auto auto;
  max-height: calc(100vh - 160px); overflow-y: auto;
}
#legend .section { grid-column: 1/-1; font-weight: 600; color: #8b949e;
  text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; margin-top: 4px; }
#legend .section:first-child { margin-top: 0; }
#legend .swatch { display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle; }
#legend .lswatch { display: inline-block; width: 16px; height: 0;
  border-top: 2px solid; margin-right: 5px; vertical-align: middle; }

/* ---- Controls (bottom) ---- */
#controls {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  z-index: 20; background: var(--overlay-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 10px;
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  max-width: 94vw; justify-content: center;
}
#controls .clabel { font-size: 10px; color: #8b949e; margin: 0 2px;
  text-transform: uppercase; letter-spacing: 0.3px; }
#controls button {
  border: 1px solid var(--border); border-radius: 999px;
  padding: 3px 11px; font-size: 11px; color: var(--text);
  background: rgba(139,148,158,0.12); cursor: pointer;
  transition: background 0.2s, border-color 0.2s; white-space: nowrap;
}
#controls button:hover { background: rgba(139,148,158,0.28); }
#controls button.active { background: rgba(88,166,255,0.2); border-color: var(--c-company); color: #fff; }
#controls button:not(.active) { opacity: 0.45; }
#controls input[type="search"] {
  background: rgba(13,17,23,0.8); border: 1px solid var(--border);
  border-radius: 999px; padding: 3px 10px; font-size: 11px;
  color: var(--text); outline: none; width: 120px; margin-left: 6px;
}
#controls input[type="search"]::placeholder { color: #6e7681; }
#controls input[type="search"]:focus { border-color: var(--c-company); }

/* ---- Side panel ---- */
#panel {
  position: fixed; top: 0; right: 0; width: 340px; height: 100vh;
  background: var(--panel-bg); border-left: 1px solid var(--border);
  padding: 18px; overflow-y: auto; z-index: 30;
  transform: translateX(100%); transition: transform 0.3s ease;
}
#panel.active { transform: translateX(0); }
#panel-close {
  position: absolute; top: 10px; right: 10px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-size: 16px; width: 28px; height: 28px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
#panel h2 { margin: 0 0 12px; font-size: 15px; padding-right: 32px; }
.field { margin-bottom: 10px; }
.field-label { color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 1px; }
.field-value { font-size: 13px; color: var(--text); }
.flag-chip { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px;
  background: #30363d; margin-right: 3px; margin-bottom: 2px; }
.connections { margin-top: 14px; }
.connections h3 { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; }
.conn-item { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.conn-type { display: inline-block; font-size: 9px; text-transform: uppercase; padding: 1px 5px;
  border-radius: 3px; margin-right: 5px; color: #fff; }

/* ---- Sankey ---- */
.sankey-node rect { fill-opacity: 0.9; stroke: var(--bg); stroke-width: 1; cursor: pointer; transition: fill-opacity 0.2s; }
.sankey-node rect:hover { fill-opacity: 1; }
.sankey-node text { font: 11px sans-serif; fill: var(--text); }
.sankey-link { fill: none; stroke-opacity: 0.3; transition: stroke-opacity 0.2s; }
.sankey-link:hover { stroke-opacity: 0.55; }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  #panel { top: auto; bottom: 0; left: 0; width: 100%; height: 60vh;
    transform: translateY(100%); border-left: none; border-top: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0; }
  #panel.active { transform: translateY(0); }
  #legend { font-size: 10px; padding: 5px 8px; }
  #title-overlay h1 { font-size: 12px; padding: 4px 12px; }
  #graph text { font-size: 9px; }
}
</style>
</head>
<body>

<div id="graph"></div>
<div id="sankey" class="hidden"></div>

<div id="title-overlay"><h1>Pax-Silica — Critical Minerals</h1></div>
<button id="view-toggle">Sankey Flow</button>

<div id="legend"></div>
<div id="controls"></div>

<div id="panel">
  <button id="panel-close">&times;</button>
  <div id="panel-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
// === PAX-SILICA v4 — Critical Minerals Geopolitical Network ===
(function() {
'use strict';

// ---- Constants ----
var NC = { country:'#f85149', company:'#58a6ff', mineral:'#3fb950', deposit:'#d29922', person:'#db61a8', regulatory:'#ff8c00' };
var LC = { member_of:'#58a6ff', controls:'#ff8c00', partner:'#39c5cf', competes:'#d2a8ff', produces:'#3fb950', secures:'#bc8cff', founded:'#e3b341', chairs:'#ffa657', located_in:'#8b949e', operates:'#f0883e', processes:'#56d4dd', supply:'#79c0ff', processed_into:'#a371f7', offtake:'#bc8cff', equity:'#e3b341', sanctions:'#ff7b72', recycles:'#3fb950' };
var NTYPES = ['country','company','mineral','deposit','person','regulatory'];
var NLABELS = { country:'Countries', company:'Companies', mineral:'Minerals', deposit:'Deposits', person:'People', regulatory:'Regulatory' };
var LTYPES = ['member_of','controls','partner','competes','produces','secures','founded','chairs','located_in','operates','processes','supply','processed_into','offtake','equity','sanctions','recycles'];
var LLABELS = { member_of:'Member', controls:'Controls', partner:'Partner', competes:'Competes', produces:'Produces', secures:'Secures', founded:'Founded', chairs:'Chairs', located_in:'Located', operates:'Operates', processes:'Processes', supply:'Supply', processed_into:'Proc.In', offtake:'Offtake', equity:'Equity', sanctions:'Sanctions', recycles:'Recycles' };
var FLOWTYPES = { produces:1, supply:1, processes:1, processed_into:1, operates:1, offtake:1, secures:1, recycles:1 };

// ---- State ----
var nodes=[], links=[], degree={}, sim;
var svg, g, lg, ng, labg, ls, ns, labs, W, H;
var sankeyBuilt=false, sankeyActive=false;

// ---- Load ----
d3.json('data/minerals.json').then(function(d) {
  nodes = d.nodes; links = d.links;
  links.forEach(function(l) {
    var s = typeof l.source==='object' ? l.source.id : l.source;
    var t = typeof l.target==='object' ? l.target.id : l.target;
    degree[s] = (degree[s]||0)+1;
    degree[t] = (degree[t]||0)+1;
  });
  initGraph();
  buildLegend();
  buildControls();
  wirePanel();
}).catch(function(e) {
  document.getElementById('graph').innerHTML = '<p style="color:#f85149;padding:40px;">Error: '+e.message+'</p>';
});

// ---- Network Graph ----
function initGraph() {
  var c = document.getElementById('graph');
  W = c.clientWidth; H = c.clientHeight;
  svg = d3.select('#graph').append('svg').attr('width',W).attr('height',H);
  g = svg.append('g');
  lg = g.append('g'); ng = g.append('g'); labg = g.append('g');

  var zoom = d3.zoom().scaleExtent([0.05,8]).on('zoom', function(ev) { g.attr('transform',ev.transform); });
  svg.call(zoom);

  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d){return d.id;})
      .distance(function(l){ return 35+(l.weight||5)*3; }).strength(0.03))
    .force('charge', d3.forceManyBody().strength(-140))
    .force('center', d3.forceCenter(W/2,H/2))
    .force('collide', d3.forceCollide(16))
    .on('tick',ticked);

  ls = lg.selectAll('line').data(links).enter().append('line')
    .attr('class',function(d){return 'link link-'+d.type;})
    .attr('stroke-width',function(d){return Math.max(0.8,(d.weight||5)*0.25);});

  ns = ng.selectAll('circle').data(nodes).enter().append('circle')
    .attr('class',function(d){return 'node node-'+d.type;})
    .attr('r',function(d){var deg=degree[d.id]||0;return Math.min(11,3+deg*0.35);});

  labs = labg.selectAll('text').data(nodes).enter().append('text')
    .text(function(d){return d.label;})
    .attr('dx',function(d){var deg=degree[d.id]||0;return Math.min(11,3+deg*0.35)+3;})
    .attr('dy','.35em');

  ns.on('mouseover',function(ev,d){
    var nids = neighbors(d.id);
    ns.style('opacity',function(n){return nids.has(n.id)?1:0.08;});
    labs.style('opacity',function(n){return nids.has(n.id)?1:0.08;});
    ls.style('opacity',function(l){
      var s=idOf(l.source), t=idOf(l.target);
      return nids.has(s)||nids.has(t)?0.8:0.03;
    });
  }).on('mouseout',function(){
    ns.style('opacity',1); labs.style('opacity',1); ls.style('opacity',0.6);
  });

  ns.on('click',function(ev,d){ ev.stopPropagation(); showPanel(d); });

  ns.call(d3.drag()
    .on('start',function(ev,d){ if(!ev.active)sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',function(ev,d){ d.fx=ev.x; d.fy=ev.y; })
    .on('end',function(ev,d){ if(!ev.active)sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  window.addEventListener('resize',function(){
    W=c.clientWidth; H=c.clientHeight;
    svg.attr('width',W).attr('height',H);
    sim.force('center',d3.forceCenter(W/2,H/2)).alpha(0.3).restart();
  });
}

function ticked() {
  ls.attr('x1',function(d){return d.source.x;}).attr('y1',function(d){return d.source.y;})
     .attr('x2',function(d){return d.target.x;}).attr('y2',function(d){return d.target.y;});
  ns.attr('cx',function(d){return d.x;}).attr('cy',function(d){return d.y;});
  labs.attr('x',function(d){return d.x;}).attr('y',function(d){return d.y;});
}

function neighbors(nid) {
  var s = new Set([nid]);
  links.forEach(function(l){ var a=idOf(l.source), b=idOf(l.target);
    if(a===nid)s.add(b); if(b===nid)s.add(a); });
  return s;
}
function idOf(o) { return typeof o==='object' ? o.id : o; }

// ---- Detail Panel ----
function showPanel(d) {
  var p=document.getElementById('panel'), c=document.getElementById('panel-content');
  var h='<h2>'+esc(d.label)+'</h2>';

  h+='<div class="field"><div class="field-label">Type</div><div class="field-value" style="color:'+(NC[d.type]||'#8b949e')+'">'+cap(d.type)+'</div></div>';

  if(d.flags&&d.flags.length) {
    h+='<div class="field"><div class="field-label">Flags</div><div class="field-value">';
    d.flags.forEach(function(f){ h+='<span class="flag-chip">'+esc(f)+'</span>'; });
    h+='</div></div>';
  }

  if(d.type==='country') {
    if(d.notes)h+=f('Notes',d.notes);
  }else if(d.type==='company'){
    if(d.country)h+=f('Country',esc(d.country));
    if(d.notes)h+=f('Notes',d.notes);
  }else if(d.type==='mineral'){
    if(d.formula)h+=f('Formula',esc(d.formula));
    if(d.uses&&d.uses.length)h+=f('Uses',d.uses.map(esc).join(', '));
  }else if(d.type==='deposit'){
    if(d.country)h+=f('Country',esc(d.country));
    if(d.mineral)h+=f('Mineral',esc(d.mineral));
    if(d.notes)h+=f('Notes',d.notes);
  }else if(d.type==='person'){
    if(d.affiliation)h+=f('Affiliation',esc(d.affiliation));
    if(d.nationality)h+=f('Nationality',esc(d.nationality));
    if(d.notes)h+=f('Notes',d.notes);
  }else if(d.type==='regulatory'){
    if(d.subtype)h+=f('Subtype',esc(d.subtype));
    if(d.full_name)h+=f('Full Name',esc(d.full_name));
    if(d.launched)h+=f('Launched',esc(String(d.launched)));
    if(d.members_count)h+=f('Members',esc(String(d.members_count)));
    if(d.notes)h+=f('Notes',d.notes);
  }

  // Connections
  var conns = [];
  links.forEach(function(l){ var s=idOf(l.source), t=idOf(l.target);
    if(s===d.id){ var tn=findNode(t); conns.push({type:l.type,label:tn?tn.label:t,weight:l.weight}); }
    else if(t===d.id){ var sn=findNode(s); conns.push({type:l.type,label:sn?sn.label:s,weight:l.weight}); }
  });
  h+='<div class="connections"><h3>Connections ('+conns.length+')</h3>';
  conns.forEach(function(c){
    h+='<div class="conn-item"><span class="conn-type" style="background:'+(LC[c.type]||'#8b949e')+'">'+cap(c.type.replace(/_/g,' '))+'</span>';
    h+=esc(c.label);
    if(c.weight)h+=' <span style="color:#6e7681;font-size:10px;">w:'+c.weight+'</span>';
    h+='</div>';
  });
  h+='</div>';

  c.innerHTML=h;
  p.classList.add('active');
}

function findNode(id) { for(var i=0;i<nodes.length;i++)if(nodes[i].id===id)return nodes[i]; return null; }

function wirePanel() {
  document.getElementById('panel-close').addEventListener('click',function(){
    document.getElementById('panel').classList.remove('active');
  });
}

// ---- Legend ----
function buildLegend(){
  var l=document.getElementById('legend'), h='';
  h+='<div class="section">Nodes</div>';
  NTYPES.forEach(function(t){ var c=getCSS('--c-'+t);
    h+='<div><span class="swatch" style="background:'+c+'"></span>'+cap(t)+'</div>'; });
  h+='<div class="section">Links</div>';
  LTYPES.forEach(function(t){
    h+='<div><span class="lswatch" style="border-color:'+(LC[t]||'#8b949e')+'"></span>'+LLABELS[t]+'</div>';
  });
  l.innerHTML=h;
}
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#8b949e'; }

// ---- Filters + Search ----
var aNT=new Set(NTYPES), aLT=new Set(LTYPES);

function buildControls(){
  var c=document.getElementById('controls'), h='';
  h+='<span class="clabel">Nodes</span>';
  NTYPES.forEach(function(t){ h+='<button class="active" data-type="'+t+'" data-kind="node">'+NLABELS[t]+'</button>'; });
  h+='<span class="clabel">Links</span>';
  LTYPES.forEach(function(t){ h+='<button class="active" data-type="'+t+'" data-kind="link">'+LLABELS[t]+'</button>'; });
  h+='<input type="search" id="search" placeholder="Search...">';
  c.innerHTML=h;

  c.querySelectorAll('button[data-type]').forEach(function(b){
    b.addEventListener('click',function(){
      var set=b.getAttribute('data-kind')==='node'?aNT:aLT, t=b.getAttribute('data-type');
      if(set.has(t)){set.delete(t);b.classList.remove('active');}else{set.add(t);b.classList.add('active');}
      applyFilters();
    });
  });
  document.getElementById('search').addEventListener('input',function(){applySearch(this.value);});
}

function applyFilters(){
  ns.style('display',function(d){return aNT.has(d.type)?null:'none';});
  labs.style('display',function(d){return aNT.has(d.type)?null:'none';});
  ls.style('display',function(d){
    var st=lnType(d.source), tt=lnType(d.target);
    return (aNT.has(st)&&aNT.has(tt)&&aLT.has(d.type))?null:'none';
  });
  sim.alpha(0.3).restart();
}
function lnType(e){ return (typeof e==='object'&&e!==null)?e.type: (findNode(e)||{}).type; }

function applySearch(q){
  q=q.trim().toLowerCase();
  ns.style('opacity',null).attr('r',function(d){var deg=degree[d.id]||0;return Math.min(11,3+deg*0.35);});
  labs.style('opacity',null); ls.style('opacity',null);
  if(!q)return;

  var mids=new Set();
  nodes.forEach(function(d){ if(aNT.has(d.type)&&d.label.toLowerCase().indexOf(q)!==-1)mids.add(d.id); });

  ns.style('opacity',function(d){if(!aNT.has(d.type))return null;return mids.has(d.id)?1:0.08;})
    .attr('r',function(d){if(!aNT.has(d.type))return null;
      var deg=degree[d.id]||0,br=Math.min(11,3+deg*0.35);return mids.has(d.id)?br*1.6:br;});
  labs.style('opacity',function(d){if(!aNT.has(d.type))return null;return mids.has(d.id)?1:0.08;});
  ls.style('opacity',function(d){
    var st=lnType(d.source),tt=lnType(d.target);
    if(!aNT.has(st)||!aNT.has(tt)||!aLT.has(d.type))return null;
    var s=idOf(d.source),t=idOf(d.target);
    return (mids.has(s)||mids.has(t))?0.8:0.03;
  });
}

// ---- Sankey ----
function buildSankey(){
  if(sankeyBuilt)return; sankeyBuilt=true;

  var fl=links.filter(function(l){return FLOWTYPES[l.type];});
  var nset=new Set(); fl.forEach(function(l){nset.add(idOf(l.source));nset.add(idOf(l.target));});
  var skNodes=[], nm={};
  nodes.forEach(function(n){ if(nset.has(n.id)){nm[n.id]=skNodes.length;skNodes.push({name:n.label,type:n.type,id:n.id,orig:JSON.parse(JSON.stringify(n))});} });
  var skLinks=fl.map(function(l){
    var s=idOf(l.source),t=idOf(l.target);
    if(nm[s]===undefined||nm[t]===undefined)return null;
    if(nm[s]===nm[t])return null; // skip self-loops (sankey forbids cycles)
    return {source:nm[s],target:nm[t],value:l.weight||5,type:l.type};
  }).filter(Boolean);

  var c=document.getElementById('sankey'), w=c.clientWidth, hh=c.clientHeight;
  if(!w||!hh){ w=window.innerWidth; hh=window.innerHeight; }

  var skSvg=d3.select('#sankey').selectAll('svg').remove();
  skSvg=d3.select('#sankey').append('svg').attr('width',w).attr('height',hh);
  var skG=skSvg.append('g');
  skSvg.call(d3.zoom().scaleExtent([0.05,8]).on('zoom',function(ev){skG.attr('transform',ev.transform);}));

  if(!skNodes.length||!skLinks.length){ skG.append('text').attr('x',w/2).attr('y',hh/2).attr('text-anchor','middle').attr('fill','#8b949e').text('No flow data'); return; }

  // Filter out reciprocal/cyclic pairs (d3-sankey requires DAG)
  var seen = {};
  var cleanLinks = skLinks.filter(function(l){
    var key = Math.min(l.source,l.target)+'-'+Math.max(l.source,l.target);
    if(seen[key]) return l.source < l.target; // keep only one direction
    seen[key] = l;
    return true;
  });

  try {
    var sankey=d3.sankey().nodeWidth(14).nodePadding(5).extent([[10,10],[w-110,hh-10]]);
    var g2=sankey({nodes:skNodes.map(function(d){return Object.assign({},d);}),links:cleanLinks.map(function(d){return Object.assign({},d);})});
  } catch(e){
    skG.append('text').attr('x',w/2).attr('y',hh/2).attr('text-anchor','middle').attr('fill','#f85149').text('Sankey error: '+e.message);
    return;
  }

  skG.append('g').selectAll('path').data(g2.links).enter().append('path')
    .attr('class','sankey-link').attr('d',d3.sankeyLinkHorizontal())
    .attr('stroke',function(d){return LC[d.type]||'#8b949e';})
    .attr('stroke-width',function(d){return Math.max(1,d.width);});

  var snode=skG.append('g').selectAll('g').data(g2.nodes).enter().append('g')
    .attr('class','sankey-node').attr('transform',function(d){return'translate('+d.x0+','+d.y0+')';});

  snode.append('rect').attr('height',function(d){return Math.max(1,d.y1-d.y0);})
    .attr('width',sankey.nodeWidth()).attr('fill',function(d){return NC[d.type]||'#8b949e';})
    .on('click',function(ev,d){ev.stopPropagation();showPanel(d.orig);});

  snode.append('text').attr('x',sankey.nodeWidth()+4)
    .attr('y',function(d){return(d.y1-d.y0)/2;}).attr('dy','.35em').attr('text-anchor','start')
    .text(function(d){return d.name;})
    .filter(function(d){return d.x0>w/2;}).attr('x',-4).attr('text-anchor','end');
}

// ---- View Toggle ----
document.getElementById('view-toggle').addEventListener('click',function(){
  if(!sankeyActive){
    document.getElementById('graph').classList.add('hidden');
    document.getElementById('sankey').classList.remove('hidden');
    document.getElementById('legend').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
    this.textContent='Network Graph';
    sankeyActive=true;
    buildSankey();
  }else{
    document.getElementById('graph').classList.remove('hidden');
    document.getElementById('sankey').classList.add('hidden');
    document.getElementById('legend').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    this.textContent='Sankey Flow';
    sankeyActive=false;
  }
});

// Click SVG background closes panel
document.getElementById('graph').addEventListener('click',function(){
  document.getElementById('panel').classList.remove('active');
});

// ---- Helpers ----
function esc(s){ if(!s)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}
function cap(s){ if(!s)return'';return s.charAt(0).toUpperCase()+s.slice(1);}
function f(label,value){ return'<div class="field"><div class="field-label">'+label+'</div><div class="field-value">'+value+'</div></div>'; }

})();
</script>
